---
- name: Deploy to Tomcat
  hosts: web
  become: yes
  
  tasks:
    - name: Copy WAR file to Tomcat
      copy:
      src: "/var/snap/jenkins/5022/MyAnsibleApp-CICD/target/MyAnsibleApp.war"
      dest: "/opt/tomcat/webapps/MyAnsibleApp.war"
      remote_src: no
    - name: Restart Tomcat
      shell: |
        /opt/tomcat/bin/shutdown.sh || true
        sleep 5
        /opt/tomcat/bin/startup.sh 
  
